<div class="ot-video-modal" id="ot-video-modal" hidden>
  <div class="ot-video-modal__backdrop" data-ot-video-close tabindex="-1" aria-hidden="true"></div>
  <div class="ot-video-modal__dialog" role="dialog" aria-modal="true" aria-label="핵심 영상">
    <button type="button" class="ot-video-modal__close" data-ot-video-close aria-label="닫기">×</button>
    <div class="ot-video-modal__player">
      <video class="ot-video-modal__video" id="ot-video-modal-video" controls playsinline webkit-playsinline preload="metadata" src="assets/videos/hero-video-03.mp4"></video>
      <span class="ot-video-modal__temp-badge">임시 영상</span>
    </div>
  </div>
</div>
